<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTIPE AI - 대화형 축제 · 여행 추천</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/bot.css">
</head>
<body>
    <div class="container">
        <div class="chat-section">
            <header class="brand-header">
                <div class="brand-logo">
                    <span class="brand-mark">✦</span>
                    <div class="brand-text">
                        <h1 class="brand-title">MOTIPE <span class="brand-ai">AI</span></h1>
                        <p class="brand-tagline">당신의 여행과 축제를 안내하는 AI 가이드</p>
                    </div>
                </div>
            </header>
            <div class="chat-box" id="chatBox">
                <div class="message assistant">안녕하세요! 지역 축제에 따른 여행지를 알려드릴게요. [지역명]을 입력해서 대화를 시작하세요!</div>
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="메시지를 입력하세요..." onkeydown="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">전송</button>
            </div>
        </div>

    <script src="../js/bot.js"></script>
</body>
</html>
