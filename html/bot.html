<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTIPE AI - 대화형 축제 · 여행 추천</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/bot.css">
</head>
<body>
    <div class="container">
        <div class="chat-section">
            <header class="brand-header">
                <div class="brand-logo">
                    <span class="brand-mark">✦</span>
                    <div class="brand-text">
                        <h1 class="brand-title">MOTIPE <span class="brand-ai">AI</span></h1>
                        <p class="brand-tagline">당신의 여행과 축제를 안내하는 AI 가이드</p>
                    </div>
                </div>
            </header>
            <div class="chat-box" id="chatBox">
                <div class="message assistant">안녕하세요! 지역 축제에 따른 여행지를 알려드릴게요. [지역명]을 입력해서 대화를 시작하세요!</div>
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="메시지를 입력하세요..." onkeydown="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">전송</button>
            </div>
        </div>

        <div class="dashboard-section">
            <h2 class="dashboard-title">🧭 나의 여행 매니저</h2>
            
            <div class="card">
                <h3>📌 추천된 여행지 바로 임시 저장 (Scrap)</h3>
                <div id="recommendation-container">추천된 축제가 이곳에 표시됩니다.</div>
            </div>

            <div class="card">
                <h3>❤️ 내가 스크랩한 축제 목록</h3>
                <ul id="savedList"></ul>
            </div>

            <div class="card">
                <h3>✈️ 나의 과거 여행 이력 관리</h3>
                <div class="history-form">
                    <input type="text" id="histName" placeholder="여행지명">
                    <input type="date" id="histDate">
                    <button onclick="addHistory()">기록 추가</button>
                </div>
                <ul id="history-list"></ul>
            </div>

            <div class="card planner-photo-card">
                <h3>🗺️ 추천 여행지 사진</h3>
                <div class="photo-box">
                    <div id="photo-loading" class="photo-loading">📸 이미지를 불러오는 중...</div>
                    <img id="planner-img" src="" alt="추천 여행지 사진" class="planner-img" />
                </div>
                <p id="unsplash-credit" class="photo-credit">
                    Photo by <a id="author-link" href="#" target="_blank"></a> on Unsplash
                </p>
            </div>
        </div>
    </div>
    

    <script src="../js/bot.js"></script>
</body>
</html>
