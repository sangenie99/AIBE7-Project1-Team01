    <script>
      const wrapper = document.querySelector(".slider-wrapper");
      const prevBtn = document.querySelector(".prev-btn");
      const nextBtn = document.querySelector(".next-btn");
      const totalSlides = document.querySelectorAll(".slide").length;

      let currentIndex = 0;

      // 슬라이드 이동 함수
      function moveSlide(index) {
        // 인덱스가 범위를 벗어나지 않도록 처리 (순환 구조)
        if (index < 0) {
          currentIndex = totalSlides - 1;
        } else if (index >= totalSlides) {
          currentIndex = 0;
        } else {
          currentIndex = index;
        }

        // 1장당 가로 폭인 -100% 단위로 곱해서 컨테이너를 통째로 밀어줍니다.
        wrapper.style.transform = `translateX(-${currentIndex * 100}%)`;
      }

      // 버튼 클릭 이벤트 리스너 설정
      prevBtn.addEventListener("click", () => {
        moveSlide(currentIndex - 1);
        resetAutoSlide();
      });

      nextBtn.addEventListener("click", () => {
        moveSlide(currentIndex + 1);
        resetAutoSlide();
      });

      // 자동 슬라이드 로직
      let slideInterval;
      
      function startAutoSlide() {
        slideInterval = setInterval(() => {
          moveSlide(currentIndex + 1);
        }, 4000);
      }

      function stopAutoSlide() {
        clearInterval(slideInterval);
      }

      function resetAutoSlide() {
        stopAutoSlide();
        startAutoSlide();
      }

      // 슬라이더 영역에 마우스가 올라가면 자동 슬라이드 멈춤
      wrapper.addEventListener("mouseenter", stopAutoSlide);
      wrapper.addEventListener("mouseleave", startAutoSlide);

      // 페이지 진입 시 자동 슬라이드 시작
      startAutoSlide();

      // ============================================
      // 검색 로직 추가 (DESIGN.md 준수)
      // ============================================
      const searchInput = document.querySelector(".search-input");
      const searchBtn = document.querySelector(".search-button");
      const searchResults = document.getElementById("searchResults");

      // 기본 추천 여행지 데이터셋 정의
      const STATIC_DESTINATIONS = [
        {
          category: "추천 여행지",
          title: "고요한 모래섬",
          content:
            "바쁜 일상에서 벗어나 파도 소리에 귀를 기울여보세요. 인적 드문 해변과 따뜻한 차 한 잔이 기다립니다.",
        },
        {
          category: "추천 여행지",
          title: "제주 평대리",
          content:
            "푸른 바다와 돌담길이 어우러진 조용한 마을. 따뜻한 노을을 바라보며 마시는 커피 한 잔이 위로를 줍니다.",
        },
        {
          category: "추천 여행지",
          title: "강릉 안목해변",
          content:
            "끝없이 펼쳐진 동해 바다를 바라보며 커피 한 잔의 여유를 즐길 수 있는 감성 해변입니다.",
        },
        {
          category: "추천 여행지",
          title: "담양 메타세쿼이아",
          content:
            "초록빛 나무들이 터널을 이루는 아름다운 길. 자전거를 타고 바람을 느끼며 걷기 좋은 안식처입니다.",
        },
      ];

      // 검색 실행 함수
      function performSearch() {
        const query = searchInput.value.trim().toLowerCase();
        searchResults.innerHTML = "";

        if (!query) {
          searchResults.style.display = "flex";
          searchResults.innerHTML = `
                    <div class="no-results-card">
                        🔍 검색어를 입력해 주세요. (예: 제주, 오두막, 노을)
                    </div>
                `;
          return;
        }

        // 1. Static 데이터에서 검색
        const matchedStatic = STATIC_DESTINATIONS.filter(
          (item) =>
            item.title.toLowerCase().includes(query) ||
            item.content.toLowerCase().includes(query),
        );

        // 2. localStorage의 커뮤니티 글 데이터에서 검색
        let matchedCommunity = [];
        const storedPosts = localStorage.getItem("community_posts");
        if (storedPosts) {
          try {
            const posts = JSON.parse(storedPosts);
            matchedCommunity = posts
              .filter(
                (post) =>
                  post.title.toLowerCase().includes(query) ||
                  post.content.toLowerCase().includes(query),
              )
              .map((post) => ({
                category: `커뮤니티 | ${post.category}`,
                title: post.title,
                content: post.content,
              }));
          } catch (e) {
            console.error("Failed to parse community posts", e);
          }
        }

        const allResults = [...matchedStatic, ...matchedCommunity];

        // 3. 결과 렌더링
        searchResults.style.display = "flex";
        if (allResults.length === 0) {
          searchResults.innerHTML = `
                    <div class="no-results-card">
                        🍂 '${escapeHtml(query)}'에 대한 검색 결과가 없습니다. 다른 검색어를 입력해 보세요.
                    </div>
                `;
        } else {
          searchResults.innerHTML = allResults
            .map(
              (item) => `
                    <div class="search-result-card">
                        <span class="category">${escapeHtml(item.category)}</span>
                        <h3>${escapeHtml(item.title)}</h3>
                        <p>${escapeHtml(item.content)}</p>
                    </div>
                `,
            )
            .join("");
        }
      }

      // HTML escape helper
      function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      // 검색 이벤트 리스너 등록
      if (searchBtn) searchBtn.addEventListener("click", performSearch);
      if (searchInput) searchInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          performSearch();
        }
      });

      // ============================================
      // 공지사항(챗봇) 창 열기/닫기 로직 추가
      // ============================================
      const chatToggle = document.getElementById("travel-chat-toggle");
      const chatPanel = document.getElementById("travel-chat-panel");
      const chatClose = document.getElementById("travel-chat-close");

      if (chatToggle && chatPanel) {
        chatToggle.addEventListener("click", () => {
          chatPanel.classList.toggle("hidden");
        });
      }

      if (chatClose && chatPanel) {
        chatClose.addEventListener("click", () => {
          chatPanel.classList.add("hidden");
        });
      }

// ============================================
// AI 챗봇 모달 제어 로직 (Motipe_bot iframe 호출)
// ============================================
const openAiChatBtn = document.getElementById("openAiChatBtn");
const closeAiChatBtn = document.getElementById("closeAiChatBtn");
const aiChatModal = document.getElementById("aiChatModal");
const aiBotFrame = document.getElementById("aiBotFrame");

// 모달 열기 — iframe src를 data-src에서 주입 (최초 1회 로드)
function openAiModal() {
  if (aiBotFrame && aiBotFrame.src === "about:blank") {
    aiBotFrame.src = aiBotFrame.dataset.src;
  }
  aiChatModal.classList.remove("hidden");
  document.body.style.overflow = "hidden";
}

// 모달 닫기 — iframe을 about:blank로 되돌려 백그라운드 동작/소리 중지
function closeAiModal() {
  aiChatModal.classList.add("hidden");
  document.body.style.overflow = "auto";
}

openAiChatBtn.addEventListener("click", openAiModal);
closeAiChatBtn.addEventListener("click", closeAiModal);

// 모달 외부(오버레이) 클릭 시 닫기
aiChatModal.addEventListener("click", (e) => {
  if (e.target === aiChatModal) {
    closeAiModal();
  }
});

// ESC 키로 닫기
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && !aiChatModal.classList.contains("hidden")) {
    closeAiModal();
  }
});

    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      // ============================================
      // 커뮤니티 최신 게시글 썸네일 노출
      // community.js가 window.supabaseClient 준비 후 'supabase-ready' 발생
      // ============================================
      (function () {
        const MAX_THUMBS = 8; // 메인에 보여줄 최대 개수

        function escapeAttr(str) {
          const d = document.createElement("div");
          d.textContent = str ?? "";
          return d.innerHTML;
        }

        function categoryBadgeClass(category) {
          return (
            { "여행 리뷰": "review", "여행 꿀팁": "tip", "질문 하기": "question" }[
              category
            ] ?? ""
          );
        }

        function defaultCategoryImage(category) {
          const map = {
            "여행 리뷰":
              "https://6a276ea0b82917fdef05cb59.imgix.net/image-1.webp?w=1200&h=800",
            "여행 꿀팁":
              "https://6a276ea0b82917fdef05cb59.imgix.net/yjp009-west-sea-7860536_1920.jpg?w=1920&h=1080",
          };
          return map[category] ?? null;
        }

        function buildThumb(post) {
          const imageUrl = post.image_url || defaultCategoryImage(post.category);
          const imgTag = imageUrl
            ? `<img src="${escapeAttr(imageUrl)}" alt="${escapeAttr(post.title)}" class="post-image" loading="lazy" onerror="this.style.display='none'" />`
            : "";
          return `
            <a class="post-card community-thumb" href="community.html">
              ${imgTag}
              <div class="post-content">
                <span class="category-badge ${categoryBadgeClass(post.category)}">${escapeAttr(post.category)}</span>
                <h3>${escapeAttr(post.title)}</h3>
                <p>${escapeAttr(post.content)}</p>
              </div>
            </a>`;
        }

        async function renderCommunityThumbs() {
          const grid = document.getElementById("communityThumbs");
          if (!grid || !window.supabaseClient) return;

          try {
            const { data, error } = await window.supabaseClient
              .from("posts")
              .select("*")
              .order("created_at", { ascending: false })
              .limit(MAX_THUMBS);

            if (error) throw error;

            if (!data || data.length === 0) {
              grid.innerHTML =
                '<div class="empty-message">📝 아직 게시글이 없습니다.</div>';
              return;
            }

            grid.innerHTML = data.map(buildThumb).join("");
          } catch (err) {
            console.error("커뮤니티 썸네일 로드 실패:", err);
            grid.innerHTML =
              '<div class="empty-message">⚠️ 게시글을 불러오지 못했습니다.</div>';
          }
        }

        if (window.supabaseClient) {
          renderCommunityThumbs();
        } else {
          window.addEventListener("supabase-ready", renderCommunityThumbs, {
            once: true,
          });
        }
      })();
    </script>
  </body>
