<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="../icons/MOTIPE%20favicon.png" />
    <title>마이페이지 - 노을빛 여행</title>
    <link rel="stylesheet" href="../css/main.css" />
    <style>
      /* 내 게시글 목록 */
      .my-posts-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 10px;
      }
      .my-post-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color: var(--bg-warm);
        border-radius: 8px;
        padding: 14px 18px;
        transition: var(--transition);
        gap: 10px;
      }
      .my-post-item:hover {
        background-color: var(--accent-sepia);
        transform: translateX(4px);
      }
      .my-post-info {
        display: flex;
        flex-direction: column;
        gap: 4px;
        flex: 1;
        min-width: 0;
      }
      .my-post-title {
        font-weight: 600;
        font-size: 0.95rem;
        color: var(--text-main);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .my-post-meta {
        font-size: 0.78rem;
        color: var(--text-light);
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .my-post-category {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 0.72rem;
        font-weight: 600;
        background-color: #fef3e2;
        color: #c68642;
      }
      .my-post-delete-btn {
        background: none;
        border: 1px solid #d9534f;
        color: #d9534f;
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 0.78rem;
        cursor: pointer;
        transition: var(--transition);
        flex-shrink: 0;
      }
      .my-post-delete-btn:hover {
        background-color: #d9534f;
        color: white;
      }
      .my-posts-empty {
        text-align: center;
        color: var(--text-light);
        padding: 30px 0;
        font-size: 0.9rem;
      }
      .my-posts-empty a {
        color: var(--primary-warm);
        font-weight: 600;
        text-decoration: none;
      }
      /* 토스트 */
      .toast {
        position: fixed;
        bottom: 90px;
        right: 30px;
        background-color: var(--secondary-warm);
        color: white;
        padding: 14px 28px;
        border-radius: 8px;
        font-size: 0.95rem;
        font-weight: 500;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.4s ease;
        z-index: 4000;
        pointer-events: none;
      }
      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }
      /* 비밀번호 변경 버튼 */
      .pw-change-btn {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, var(--primary-warm), var(--secondary-warm));
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        margin-top: 6px;
      }
      .pw-change-btn:hover {
        opacity: 0.88;
        transform: translateY(-1px);
      }
      /* 게시글 수 뱃지 */
      .post-count-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 24px;
        height: 24px;
        background-color: var(--primary-warm);
        color: white;
        border-radius: 12px;
        font-size: 0.78rem;
        font-weight: 700;
        padding: 0 7px;
        margin-left: 8px;
      }
      /* 섹션 헤더 */
      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }
      .section-header h3 {
        margin: 0;
      }
      .go-community-btn {
        font-size: 0.82rem;
        color: var(--primary-warm);
        text-decoration: none;
        font-weight: 600;
        transition: var(--transition);
      }
      .go-community-btn:hover {
        color: var(--secondary-warm);
      }
      /* 확인 모달 */
      .confirm-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 3000;
        backdrop-filter: blur(3px);
      }
      .confirm-box {
        background-color: var(--card-bg);
        padding: 35px 40px;
        border-radius: 8px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      }
      .confirm-box p {
        margin-bottom: 20px;
        font-size: 1.05rem;
        color: var(--text-main);
      }
      .confirm-box .btn-group {
        display: flex;
        gap: 10px;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-brand-group">
        <a href="main.html" class="nav-logo">
          <img src="../icons/screen.png" alt="Motipe 로고" class="nav-logo-img" />
        </a>
        <div class="nav-left">
          <a href="main.html">지도</a>
          <a href="community.html">커뮤니티</a>
        </div>
      </div>

      <div class="nav-right">
        <!-- 로그인 전 상태 -->
        <div id="nav-guest" class="nav-auth-group">
          <a href="login.html" class="nav-btn-outline">로그인</a>
          <a href="signup.html" class="nav-btn-outline">회원가입</a>
        </div>

        <!-- 로그인 후 상태 (기본적으로 숨김) -->
        <div id="nav-user" class="nav-auth-group" style="display: none">
          <a href="mypage.html" class="nav-icon-link">
            <img
              src="../icons/mypage-icon.png"
              alt="마이페이지"
              class="nav-mypage-img"
            />
          </a>
          <button type="button" id="logout-btn" class="nav-btn-outline">
            로그아웃
          </button>
        </div>
      </div>
    </nav>

    <header>
      <h1>MY PAGE</h1>
      <p>나의 여행 기록과 계정 설정을 관리하세요</p>
    </header>

    <main class="container">
      <!-- 프로필 섹션 -->
      <section class="profile-card">
        <div class="profile-info">
          <h2>안녕하세요, <span id="user-display-name">여행자</span>님</h2>
          <p id="user-email" style="color: var(--text-light); margin-bottom: 20px">
            로딩 중...
          </p>
          <p>"오늘도 당신의 여정에 따스한 햇살이 함께하기를 바랍니다."</p>
        </div>
      </section>

      <!-- 내가 작성한 글 섹션 -->
      <section class="settings-card">
        <div class="section-header">
          <h3>
            내가 작성한 글
            <span class="post-count-badge" id="my-post-count">0</span>
          </h3>
          <a href="community.html" class="go-community-btn">커뮤니티 바로가기 →</a>
        </div>
        <div class="my-posts-list" id="my-posts-list">
          <div class="my-posts-empty">로딩 중...</div>
        </div>
      </section>

      <!-- 비밀번호 변경 섹션 -->
      <section class="settings-card password-section">
        <h3>보안 설정</h3>
        <form id="pw-form" onsubmit="return false;">
          <div class="form-group">
            <label for="new-pw">새 비밀번호</label>
            <input
              type="password"
              id="new-pw"
              class="input-field"
              placeholder="새 비밀번호를 입력하세요 (6자 이상)"
            />
          </div>
          <div class="form-group">
            <label for="confirm-pw">새 비밀번호 확인</label>
            <input
              type="password"
              id="confirm-pw"
              class="input-field"
              placeholder="한 번 더 입력하세요"
            />
          </div>
          <button type="button" class="pw-change-btn" onclick="changePassword()">
            비밀번호 변경하기
          </button>
        </form>
      </section>

      <!-- 계정 관리 -->
      <section
        class="settings-card"
        style="grid-column: 1 / -1; text-align: center"
      >
        <div style="display: flex; justify-content: center; gap: 40px">
          <a href="#" id="mypage-logout-link">로그아웃</a>
          <span class="danger-link">회원 탈퇴</span>
        </div>
      </section>
    </main>

    <!-- 삭제 확인 모달 -->
    <div id="confirmModal" class="confirm-overlay">
      <div class="confirm-box">
        <p>정말 이 게시글을 삭제하시겠습니까?</p>
        <div class="btn-group">
          <button class="small-button" onclick="closeConfirm()">취소</button>
          <button
            class="cta-button"
            style="background-color: #d9534f; border-color: #d9534f"
            onclick="confirmDelete()"
          >
            삭제
          </button>
        </div>
      </div>
    </div>

    <!-- 토스트 알림 -->
    <div id="toast" class="toast"></div>

    <footer>
      <p>&copy; 2026 Sunset Glow Travel. 모든 여행이 쉼표가 되길.</p>
    </footer>

    <script>
      const STORAGE_KEY = "community_posts";

      // ===== 토스트 =====
      function showToast(message) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(() => {
          toast.classList.remove("show");
        }, 2500);
      }

      // ===== 내 게시글 로드 =====
      function loadMyPosts(userId) {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (!stored) return [];
        const posts = JSON.parse(stored);
        return posts.filter((p) => !p.isDefault && p.userId === userId);
      }

      function renderMyPosts(userId) {
        const listEl = document.getElementById("my-posts-list");
        const countEl = document.getElementById("my-post-count");
        const myPosts = loadMyPosts(userId);

        countEl.textContent = myPosts.length;

        if (myPosts.length === 0) {
          listEl.innerHTML = `
            <div class="my-posts-empty">
              아직 작성한 글이 없습니다.<br>
              <a href="community.html">커뮤니티에서 첫 글을 작성해보세요! ✏️</a>
            </div>`;
          return;
        }

        listEl.innerHTML = myPosts
          .map(
            (post) => `
          <div class="my-post-item">
            <div class="my-post-info">
              <div class="my-post-title">${escapeHtml(post.title)}</div>
              <div class="my-post-meta">
                <span class="my-post-category">${escapeHtml(post.category)}</span>
                <span>${post.date}</span>
                <span>댓글 ${(post.comments || []).length}개</span>
              </div>
            </div>
            <button class="my-post-delete-btn" onclick="requestDelete('${post.id}')">🗑️ 삭제</button>
          </div>
        `
          )
          .join("");

        // 렌더링 후 현재 userId 보관
        window._myPageUserId = userId;
      }

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text || "";
        return div.innerHTML;
      }

      // ===== 게시글 삭제 =====
      let deleteTargetId = null;

      function requestDelete(postId) {
        deleteTargetId = postId;
        document.getElementById("confirmModal").style.display = "flex";
      }

      function closeConfirm() {
        deleteTargetId = null;
        document.getElementById("confirmModal").style.display = "none";
      }

      function confirmDelete() {
        if (!deleteTargetId) return;
        const stored = localStorage.getItem(STORAGE_KEY);
        if (!stored) { closeConfirm(); return; }

        const posts = JSON.parse(stored);
        const updated = posts.filter((p) => p.id !== deleteTargetId);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));

        closeConfirm();
        showToast("🗑️ 게시글이 삭제되었습니다.");

        // 목록 새로고침
        if (window._myPageUserId) {
          renderMyPosts(window._myPageUserId);
        }
      }

      // ===== 비밀번호 변경 =====
      async function changePassword() {
        const newPw = document.getElementById("new-pw").value.trim();
        const confirmPw = document.getElementById("confirm-pw").value.trim();

        if (!newPw) {
          showToast("⚠️ 새 비밀번호를 입력해주세요.");
          return;
        }
        if (newPw.length < 6) {
          showToast("⚠️ 비밀번호는 6자 이상이어야 합니다.");
          return;
        }
        if (newPw !== confirmPw) {
          showToast("⚠️ 비밀번호가 일치하지 않습니다.");
          return;
        }

        if (!window.supabaseClient) {
          showToast("⚠️ 인증 서버에 연결할 수 없습니다.");
          return;
        }

        try {
          const { error } = await window.supabaseClient.auth.updateUser({
            password: newPw,
          });

          if (error) {
            showToast("❌ 비밀번호 변경 실패: " + error.message);
          } else {
            showToast("✅ 비밀번호가 성공적으로 변경되었습니다!");
            document.getElementById("new-pw").value = "";
            document.getElementById("confirm-pw").value = "";
          }
        } catch (e) {
          showToast("❌ 오류가 발생했습니다. 다시 시도해주세요.");
        }
      }

      // ===== 마이페이지 초기화 (community.js 이후 실행) =====
      window.addEventListener("mypage-ready", async (e) => {
        const user = e.detail.user;
        if (!user) return;

        // 프로필 정보 표시
        const displayName =
          user.user_metadata?.full_name ||
          user.user_metadata?.name ||
          user.email.split("@")[0];

        document.getElementById("user-display-name").textContent = displayName;
        document.getElementById("user-email").textContent = user.email;

        // 내 게시글 렌더링
        renderMyPosts(user.id);
      });

      // 로그아웃 링크 연결
      document.getElementById("mypage-logout-link").addEventListener("click", async (e) => {
        e.preventDefault();
        if (window.supabaseClient) {
          await window.supabaseClient.auth.signOut();
          alert("로그아웃 되었습니다.");
          window.location.href = "main.html";
        }
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/community.js"></script>
  </body>
</html>
