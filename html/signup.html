<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="../icons/MOTIPE%20favicon.png" />
    <title>회원가입 | MOTIP</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/signup.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="navbar navbar-expand-md fixed-top glass-nav border-bottom">
      <div class="container-fluid px-4 px-lg-5">
        <a class="navbar-brand brand-name" href="index.html"
          >Sunset Glow Travel</a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#siteNav"
          aria-controls="siteNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="siteNav">
          <div class="d-flex align-items-center gap-4">
            <a class="nav-link nav-link-custom" href="index.html">Home</a>
            <a class="nav-link nav-link-custom active-link" href="login.html"
              >login</a
            >
          </div>
        </div>
      </div>
    </header>

    <main class="signup-shell">
      <section class="signup-visual d-none d-md-flex">
        <img
          alt="Sunset Glow Travel Background"
          class="signup-visual-image"
          src="https://lh3.googleusercontent.com/aida/AP1WRLtvlGUacwyEHbo5777PFsZP4P6JLShx6ktbLrq8LzZXqLbH1dPsi0W8JNo4hSPT2iBzpABukH3OuUvLrqduyC3f_yn3rc1DbvI7LGO8IlI1g306oOSRHLQJ_zCCvih5PrEty_UbL1v7DF9lVq6Jm8d7D9AQ_gPjtcE56vHQBY6EGHSGrEAJunGkDcJfh7g_9wvM1feYXAVLrImUD9Nc7BOHlQBElwSyjklhqNE0TDm8pHXD8qQPbfw9wzY"
        />
        <div class="signup-visual-overlay"></div>
        <div class="signup-visual-copy">
          <h1>평온한 시작</h1>
          <p>
            안개 낀 숲의 신비로움과 오두막의 따스함이 어우러진 Sunset Glow
            Travel에서 당신만의 진정한 여정을 설계하세요.
          </p>
        </div>
      </section>

      <section class="signup-panel">
        <div class="signup-panel-inner">
          <div class="mb-4">
            <h2 class="signup-title">새로운 여정의 시작</h2>
            <p class="signup-subtitle">
              자신만을 위한 진정한 휴식을 찾는 이들을 위한 회원가입입니다.
            </p>
          </div>

          <form id="signup-form" class="vstack gap-4">
            <div>
              <label for="name" class="form-label signup-label">이름</label>
              <input
                id="name"
                type="text"
                class="form-control signup-input"
                placeholder="홍길동"
              />
            </div>

            <div>
              <label for="email" class="form-label signup-label">이메일</label>
              <input
                id="email"
                type="email"
                class="form-control signup-input"
                placeholder="example@sunsetglow.com"
              />
            </div>

            <div>
              <label for="password" class="form-label signup-label"
                >비밀번호</label
              >
              <div class="input-group signup-password-group">
                <input
                  id="password"
                  type="password"
                  class="form-control signup-input"
                  placeholder="••••••••"
                />
                <button
                  class="btn signup-icon-btn"
                  type="button"
                  aria-label="비밀번호 보기"
                >
                  <span class="material-symbols-outlined">visibility</span>
                </button>
              </div>
            </div>

            <div>
              <label for="confirm-password" class="form-label signup-label"
                >비밀번호 확인</label
              >
              <input
                id="confirm-password"
                type="password"
                class="form-control signup-input"
                placeholder="••••••••"
              />
            </div>

            <button class="btn signup-submit-btn w-100" type="submit">
              새로운 여정 시작하기
            </button>
          </form>

          <p class="signup-footer-text">
            이미 회원이신가요?
            <a class="signup-link fw-bold" href="login.html">로그인</a>
          </p>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script src="../js/community.js"></script>
    <script>
      // 비밀번호 토글 기능
      const togglePasswordBtn = document.querySelector(".signup-icon-btn");
      const passwordInput = document.getElementById("password");
      if (togglePasswordBtn && passwordInput) {
        togglePasswordBtn.addEventListener("click", () => {
          const isPassword = passwordInput.type === "password";
          passwordInput.type = isPassword ? "text" : "password";
          togglePasswordBtn.querySelector(
            ".material-symbols-outlined",
          ).textContent = isPassword ? "visibility_off" : "visibility";
        });
      }

      document
        .getElementById("signup-form")
        .addEventListener("submit", async function (e) {
          e.preventDefault();
          const name = document.getElementById("name").value.trim();
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value.trim();
          const confirmPassword = document
            .getElementById("confirm-password")
            .value.trim();

          if (!name || !email || !password || !confirmPassword) {
            alert("모든 필드를 입력해주세요.");
            return;
          }

          if (password !== confirmPassword) {
            alert("비밀번호가 일치하지 않습니다.");
            return;
          }

          const button = e.target.querySelector("button[type='submit']");
          const original = button.innerHTML;
          button.disabled = true;
          button.innerHTML =
            '<span class="material-symbols-outlined align-middle signup-spinner">progress_activity</span> 가입 중...';

          try {
            if (!window.supabaseClient) {
              await window.initAuth();
            }
            const { data, error } = await window.supabaseClient.auth.signUp({
              email,
              password,
              options: {
                data: {
                  full_name: name,
                  nickname: name,
                },
              },
            });

            if (error) {
              throw error;
            }

            const user = data.user;

            if (!user) {
              throw new Error("회원가입 유저 정보를 가져오지 못했습니다.");
            }

            // public.users 저장은 프론트가 아니라 server.js API를 통해 처리
            const profileResponse = await fetch("/api/create-user-profile", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                id: user.id,
                email: email,
                nickname: name,
              }),
            });

            const profileResult = await profileResponse.json();

            if (!profileResponse.ok) {
              throw new Error(
                profileResult.message || "유저 정보 저장에 실패했습니다.",
              );
            }

            alert("회원가입이 완료되었습니다!");
            window.location.href = "login.html";
          } catch (error) {
            alert(
              "회원가입 실패: " + (error.message || "오류가 발생했습니다."),
            );
            button.innerHTML = original;
            button.disabled = false;
          }
        });
    </script>
  </body>
</html>
