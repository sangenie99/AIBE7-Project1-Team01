<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>회원가입 | MOTIP</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="signup.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="navbar navbar-expand-md fixed-top glass-nav border-bottom">
      <div class="container-fluid px-4 px-lg-5">
        <a class="navbar-brand brand-name" href="main.html">Sunset Glow Travel</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#siteNav"
          aria-controls="siteNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-between" id="siteNav">
          <ul class="navbar-nav mx-auto gap-md-4">
            <li class="nav-item"><a class="nav-link nav-link-custom" href="main.html">Home</a></li>
          </ul>
          <div class="d-flex align-items-center gap-3">
            <a class="nav-link nav-link-custom active-link" href="login.html">Sign In</a>
          </div>
        </div>
      </div>
    </header>

    <main class="signup-shell">
      <section class="signup-visual d-none d-md-flex">
        <img
          alt="Sunset Glow Travel Background"
          class="signup-visual-image"
          src="https://lh3.googleusercontent.com/aida/AP1WRLtvlGUacwyEHbo5777PFsZP4P6JLShx6ktbLrq8LzZXqLbH1dPsi0W8JNo4hSPT2iBzpABukH3OuUvLrqduyC3f_yn3rc1DbvI7LGO8IlI1g306oOSRHLQJ_zCCvih5PrEty_UbL1v7DF9lVq6Jm8d7D9AQ_gPjtcE56vHQBY6EGHSGrEAJunGkDcJfh7g_9wvM1feYXAVLrImUD9Nc7BOHlQBElwSyjklhqNE0TDm8pHXD8qQPbfw9wzY"
        />
        <div class="signup-visual-overlay"></div>
        <div class="signup-visual-copy">
          <h1>평온한 시작</h1>
          <p>
            안개 낀 숲의 신비로움과 오두막의 따스함이 어우러진 Sunset Glow
            Travel에서 당신만의 진정한 여정을 설계하세요.
          </p>
        </div>
      </section>

      <section class="signup-panel">
        <div class="signup-panel-inner">
          <div class="mb-4">
            <h2 class="signup-title">새로운 여정의 시작</h2>
            <p class="signup-subtitle">
              자신만을 위한 진정한 휴식을 찾는 이들을 위한 회원가입입니다.
            </p>
          </div>

          <form id="signup-form" class="vstack gap-4">
            <div>
              <label for="name" class="form-label signup-label">이름</label>
              <input
                id="name"
                type="text"
                class="form-control signup-input"
                placeholder="홍길동"
              />
            </div>

            <div>
              <label for="email" class="form-label signup-label">이메일</label>
              <input
                id="email"
                type="email"
                class="form-control signup-input"
                placeholder="example@sunsetglow.com"
              />
            </div>

            <div>
              <label for="password" class="form-label signup-label">비밀번호</label>
              <div class="input-group signup-password-group">
                <input
                  id="password"
                  type="password"
                  class="form-control signup-input"
                  placeholder="••••••••"
                />
                <button class="btn signup-icon-btn" type="button" aria-label="비밀번호 보기">
                  <span class="material-symbols-outlined">visibility</span>
                </button>
              </div>
            </div>

            <div>
              <label for="confirm-password" class="form-label signup-label">비밀번호 확인</label>
              <input
                id="confirm-password"
                type="password"
                class="form-control signup-input"
                placeholder="••••••••"
              />
            </div>

            <button class="btn signup-submit-btn w-100" type="submit">
              새로운 여정 시작하기
            </button>
          </form>

          <p class="signup-footer-text">
            이미 회원이신가요?
            <a class="signup-link fw-bold" href="login.html">로그인</a>
          </p>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.getElementById("signup-form").addEventListener("submit", function (e) {
        e.preventDefault();
        const button = e.target.querySelector("button[type='submit']");
        const original = button.innerHTML;
        button.disabled = true;
        button.innerHTML =
          '<span class="material-symbols-outlined align-middle signup-spinner">progress_activity</span> 준비 중...';
        setTimeout(() => {
          button.innerHTML = original;
          button.disabled = false;
        }, 2000);
      });
    </script>
  </body>
</html>
